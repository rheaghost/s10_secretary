<!DOCTYPE html>
<html>
<head>
    <title>S10 SmolLM Terminal</title>
    <style>
        body { background: #0a0a0a; color: #33ff33; font-family: 'Courier New', monospace; padding: 20px; max-width: 800px; margin: auto; }
        #output { background: #000; padding: 15px; border: 1px solid #33ff33; border-radius: 5px; min-height: 150px; white-space: pre-wrap; margin-top: 10px; box-shadow: 0 0 10px #004400; }
        .stats { font-size: 0.9em; color: #88ff88; margin-top: 10px; display: flex; justify-content: space-between; }
        textarea { width: 100%; height: 80px; background: #111; color: #33ff33; border: 1px solid #33ff33; padding: 10px; margin-top: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #33ff33; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #00cc00; }
        button:disabled { background: #004400; color: #008800; cursor: not-allowed; }
        .timer-val { font-weight: bold; color: #ffffff; }
    </style>
</head>
<body>
    <h2>[ GALAXY S10 / SMOLLM CORE ]</h2>
    
    <div id="output">SYSTEM IDLE... READY FOR COMMAND.</div>
    
    <div class="stats">
        <span>MODEL: smollm:135m</span>
        <span>ELAPSED: <span id="timer" class="timer-val">0.0</span>s</span>
    </div>

    <textarea id="msg" placeholder="Type message..."></textarea>
    <button id="send-btn" onclick="ask()">EXECUTE INFERENCE</button>

    <script>
        let startTime;
        let timerInterval;

        function startTimer() {
            startTime = Date.now();
            document.getElementById('timer').innerText = "0.0";
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(1);
            }, 100);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        async function ask() {
            const out = document.getElementById('output');
            const msg = document.getElementById('msg').value;
            const btn = document.getElementById('send-btn');
            
            if (!msg) return;

            out.innerText = "INITIALIZING STREAM...";
            btn.disabled = true;
            startTimer();

            try {
                const res = await fetch('http://192.168.0.6:11434/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        model: 'smollm:135m',
                        prompt: msg,
                        stream: true
                    })
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                out.innerText = ""; 

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.trim()) {
                            try {
                                const json = JSON.parse(line);
                                if (json.response) {
                                    out.innerText += json.response;
                                    // Auto-scroll to bottom
                                    window.scrollTo(0, document.body.scrollHeight);
                                }
                            } catch (e) { console.error("Parse error", e); }
                        }
                    }
                }
            } catch (e) {
                out.innerText = "FATAL ERROR: " + e.message;
            } finally {
                stopTimer();
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
