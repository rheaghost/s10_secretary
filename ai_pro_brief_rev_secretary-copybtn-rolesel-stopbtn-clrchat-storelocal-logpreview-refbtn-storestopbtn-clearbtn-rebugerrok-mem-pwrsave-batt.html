<!DOCTYPE html>
<html>
<head>
    <title>S10 Pro AI Terminal</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier', monospace; padding: 20px; }
        .monitor { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; border: 1px solid #00ff41; padding: 10px; font-size: 0.8em; }
        #output { background: #000; padding: 15px; border: 1px solid #00ff41; min-height: 200px; white-space: pre-wrap; margin: 10px 0; }
        select, textarea, button { width: 100%; background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 10px; margin-top: 5px; font-family: inherit; }
        button { background: #00ff41; color: #000; font-weight: bold; cursor: pointer; }
        button:disabled { background: #003300; color: #005500; }
        .label { color: #888; display: block; margin-top: 10px; font-size: 0.7em; }
    </style>
</head>
<body>
    <h2>[S10_AI_CORE_v2.0]</h2>

    <div class="monitor">
        <div>TIME: <span id="timer">0.0</span>s</div>
        <div>SPEED: <span id="tps">0.0</span> t/s</div>
        <div>STATUS: <span id="temp">STABLE</span></div>
    </div>

    <span class="label">ASSIGN ROLE:</span>
    <select id="role-select">
        <option value="You are a helpful AI Secretary. Answer concisely.">Default Secretary</option>
        <option value="You are a Senior Developer. Provide clean code snippets.">Code Debugger</option>
        <option value="You are a Creative Writer. Use vivid, descriptive language.">Creative Writer</option>
        <option value="You are a strict Editor. Fix grammar and improve flow.">Strict Editor</option>
    </select>



    <span class="label">SELECT ARCHITECTURE:</span>
    <select id="model-select">
        <option value="qwen2.5:0.5b">Qwen 2.5 (0.5B) - Fast</option>
        <option value="smollm:135m">SmolLM (135M) - Ultra-Light</option>
        <option value="llama3.2:1b">Llama 3.2 (1B) - Heavy</option>
    </select>

    <div id="output">SYSTEM READY...</div>

    <textarea id="msg" placeholder="Enter prompt..."></textarea>
    <button id="run-btn" onclick="runInference()">EXECUTE RUN</button>
    <button id="stop-btn" onclick="stopInference()" style="background: #440000; color: #ff4141; margin-top: 10px;" disabled>STOP GENERATION</button>
    <button id="copy-btn" onclick="copyOutput()" style="margin-top: 10px; background: #003300; color: #00ff41;">COPY RESPONSE</button>
    <button id="clear-btn" onclick="clearChat()" style="margin-top: 10px; background: #222; color: #888;">CLEAR TERMINAL</button>

    <div id="log-controls" style="margin-top: 20px; padding: 10px; border-top: 1px solid #ccc;">
    <button onclick="StorageManager.download()" style="background: #28a745; color: white;">Download Logs (.json)</button>
    <button onclick="StorageManager.clear()" style="background: #dc3545; color: white;">Clear Browser Storage</button>
    </div>

    <div id="preview-section" style="margin-top: 30px;">
    <h3>Recent Logs Preview</h3>
    <table id="log-table" style="width:100%; border-collapse: collapse; font-family: monospace; font-size: 12px;">
        <thead>
            <tr style="background: #eee;">
                <th style="border: 1px solid #ccc; padding: 5px;">Time</th>
                <th style="border: 1px solid #ccc; padding: 5px;">Role</th>
                <th style="border: 1px solid #ccc; padding: 5px;">Prompt (Start)</th>
                <th style="border: 1px solid #ccc; padding: 5px;">Response (Start)</th>
            </tr>
        </thead>
        <tbody id="log-preview-body">
            </tbody>
     </table>
     </div>

    <button onclick="StorageManager.updatePreview()" style="background: #007bff; color: white;">
        🔄 Refresh Table
    </button>

    <button id="clearBtn" onclick="clearChatUI()" style="background: #6c757d; color: white;">
    🗑️ Clear Screen
    </button>
    <div>BATTERY: <span id="batt-level">100%</span></div>
  
    <script>
        let startTime;
        let tokenCount = 0;
        let timer;

        let currentAbortController = null;

        
        const StorageManager = {
    DB_NAME: 'secretary_logs',

    save: function(role, prompt, response) {
        const logs = this.getAll();
        logs.push({
            timestamp: new Date().toLocaleString(),
            role: role,
            prompt: prompt,
            response: response
        });
        localStorage.setItem(this.DB_NAME, JSON.stringify(logs));
        
        // --- REACTIVE TRIGGER ---
        // This updates the table immediately after saving
        this.updatePreview(); 
    },

    getAll: function() {
        const data = localStorage.getItem(this.DB_NAME);
        return data ? JSON.parse(data) : [];
    },

    updatePreview: function() {

        const logs = this.getAll();
        console.log("Refreshing Preview. Entries found:", logs.length); // DEBUG LINE

        const tbody = document.getElementById('log-preview-body');
        if (!tbody) {
        console.error("Could not find table body element!");
        return;
        }

        //const logs = this.getAll();
        tbody.innerHTML = ""; 

        // Show last 5 entries, newest at the top
        logs.slice(-10).reverse().forEach(log => {
            const row = tbody.insertRow();
            row.innerHTML = `
                <td style="border: 1px solid #ddd; padding: 8px;">${log.timestamp}</td>
                <td style="border: 1px solid #ddd; padding: 8px; font-weight:bold;">${log.role}</td>
                <td style="border: 1px solid #ddd; padding: 8px; color: #666;">${log.prompt.substring(0, 40)}...</td>
                <td style="border: 1px solid #ddd; padding: 8px;">${log.response.substring(0, 40)}...</td>
            `;
        });
    },

    download: function() {
        const data = localStorage.getItem(this.DB_NAME) || '[]';
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `secretary_logs_${Date.now()}.json`;
        a.click();
    },

    clear: function() {
        if(confirm("Permanently delete all logs in browser?")) {
            localStorage.removeItem(this.DB_NAME);
            this.updatePreview();
        }
    }
};

// --- STARTUP LOGIC ---
// This acts as your window.onload. 
// It runs once when the browser finishes loading the HTML.
document.addEventListener('DOMContentLoaded', () => {
    console.log("AI Station UI Initialized. Loading logs...");
    StorageManager.updatePreview();
   
    // --- ADD THESE 3 LINES ---
    const savedRole = localStorage.getItem('last_selected_role');
    if (savedRole) {
        document.getElementById('role-select').value = savedRole;
    }

    // Monitor Battery to prevent "Yellow Screen" crashes
   if ('getBattery' in navigator) {
        navigator.getBattery().then(battery => {
            const updateBattery = () => {
               const level = (battery.level * 100).toFixed(0);
               const display = document.getElementById('batt-level');
                display.innerText = level + "%";
            
               // Visual warning
               if (level < 20) display.style.color = "#ff4141"; 
                else display.style.color = "#00ff41";
            };
        battery.addEventListener('levelchange', updateBattery);
        updateBattery();
        });//battery const update
     }//if getbattery
    
});




        function stopInference() {
              if (currentAbortController) {
              currentAbortController.abort();
              document.getElementById('output').innerText += "\n\n[TERMINATED BY USER]";
              }
         }

        async function runInference() {
            const role = document.getElementById('role-select').value; // New line
            localStorage.setItem('last_selected_role', role); // <--- ADD THIS LINE
            const prompt = document.getElementById('msg').value;
            const model = document.getElementById('model-select').value;
            const out = document.getElementById('output');


            const btn = document.getElementById('run-btn');
            const stopBtn = document.getElementById('stop-btn');
            // Create a new abort controller for this specific run
            currentAbortController = new AbortController();
            stopBtn.disabled = false;

            
            tokenCount = 0;
            out.innerText = "LOADING MODEL...";
            btn.disabled = true;
            stopBtn.disabled=false;


            startTime = Date.now();
            timer = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                document.getElementById('timer').innerText = elapsed.toFixed(1);
                if (elapsed > 30) document.getElementById('temp').innerText = "HOT";
                if (elapsed > 120) document.getElementById('temp').innerText = "THROTTLED";
            }, 100);


             // 4. Create a fresh AbortController for THIS specific request
          currentAbortController = new AbortController();

            

            try {
                const response = await fetch('http://192.168.0.6:11434/api/generate', {
                method: 'POST',
                signal: currentAbortController.signal, // PASS THE SIGNAL HERE
                headers: {
               'Content-Type': 'application/json',
                 },
                body: JSON.stringify({ 
                model: model, 
                system: role, // Use the role here
                prompt: prompt, // No more recipe prefix!

                stream: true,
                options: {
                       num_thread: 4  // <--- Limit threads to 4 to prevent "Yellow Screen" crashes
                   } 
                      })
                });

                const reader = response.body.getReader();
                out.innerText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) 
          
                        {
                         // --- THE CRITICAL ADDITION ---
                          // The stream is finished. Now we save the final result.
                              if (out.innerText.trim().length > 0) {
                              StorageManager.save(role, prompt, out.innerText);
                              console.log("Response complete. Saved to Browser Storage.");
                               }
                        break;
                        }

                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const json = JSON.parse(line);
                        if (json.response) {
                            out.innerText += json.response;
                            tokenCount++;
                            // Calculate Tokens Per Second
                            const elapsed = (Date.now() - startTime) / 1000;
                            document.getElementById('tps').innerText = (tokenCount / elapsed).toFixed(1);
                        }
                    }
                }
            } catch (err) {
                 
                       if (err.name === 'AbortError') {
                           console.log("Inference stopped by user.");
        
                           // --- THE "INTERRUPT" SAVE ---
                           const partialText = out.innerText.trim();
                           if (partialText.length > 0) {
                                     // We append [STOPPED] to the role to distinguish it in your logs
                               StorageManager.save(role + " [STOPPED]", prompt, partialText + "... [User Interrupted]");
                            }
        
                            out.innerText += "\n\n[INFERENCE STOPPED BY USER]";
                       } else {
                             out.innerText = "ERROR: " + err.message;
                             console.error("Fetch error:", err);
                        }

                   } finally {
                stopBtn.disabled = true;
                btn.disabled = false;
                clearInterval(timer);
            }

            //saveToLog(prompt, fullResponse)  no more used 2601062158
        }//runInference


    
        function copyOutput() {
              // OK it works 2601061209
    	const out = document.getElementById('output');
    	const btn = document.getElementById('copy-btn');
    
    	// Create a hidden textarea element
    	const textArea = document.createElement("textarea");
	textArea.value = out.innerText;
    
    	// Ensure it's not visible but exists in the DOM
    	textArea.style.position = "fixed";
    	textArea.style.left = "-9999px";
    	textArea.style.top = "0";
    	document.body.appendChild(textArea);
    
    	// Select and Copy
    	textArea.focus();
    	textArea.select();
    	textArea.setSelectionRange(0, 99999); // For mobile devices
    
    	try {
        	const successful = document.execCommand('copy');
        	if (successful) {
                    const originalText = btn.innerText;
                    btn.innerText = "COPIED!";
                    btn.style.background = "#00ff41";
                    btn.style.color = "#000";
            
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#003300";
                    btn.style.color = "#00ff41";
                   }, 2000);
                }
             } catch (err) {
                console.error('Fallback copy failed', err);
                alert("Copy failed. Try selecting text manually.");
                 }

    // Clean up
         document.body.removeChild(textArea);
     }

     function clearChat() {
          // Clear the main text area
           document.getElementById('output').innerText = "SYSTEM READY...";
    
           // Reset the monitors
           document.getElementById('timer').innerText = "0.0";
           document.getElementById('tps').innerText = "0.0";
           document.getElementById('temp').innerText = "STABLE";
    
            // Clear the input textarea
            document.getElementById('msg').value = "";
         }//clearchat


       async function saveToLog(prompt, response) {
           const model = document.getElementById('model-select').value;
           const role = document.getElementById('role-select').value;
    
           await fetch('/log', {
               method: 'POST',
               body: JSON.stringify({
               model: model,
               role: role,
               prompt: prompt,
               response: response
               })
            });
        }//savetolog

       function clearChatUI() {
         
           // 1. Force stop any current AI generation
               if (currentAbortController) {
               currentAbortController.abort();
               }

            // 2. Reset the display
               const out = document.getElementById('output');
               out.innerText = "Waiting for input...";
    
            // 3. Reset the metrics and the CLOCK
                tokenCount = 0;
                startTime = Date.now(); // Resetting this stops the TPS from skyrocketing
                //startTime=null;//clear the reference point
                document.getElementById('tps').innerText = "0.0";

             // 4. Clear the text input
               document.getElementById('msg').value = "";
               if(timer) clearInterval(timer);
    
               console.log("UI Cleared. Data remains safe in LocalStorage.");
          }//clearchatui

    </script>
</body>
</html>
